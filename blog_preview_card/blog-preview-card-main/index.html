<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./styles.css" />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main>
      <article class="card" aria-labelledby="card-title">
        <img
          class="card__image"
          src="./assets/images/illustration-article.svg"
          alt="blog article preview illustration"
        />
        <div class="card__content">
          <span class="card__badge">Learning</span>
          <span class="card__date">Published 21 Dec 2023</span>
          <a id="card-title" class="card__title" href='#'>
            HTML & CSS foundations
          </a>
          <p class="card__description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <a href='#' class="card__author">
          <img
            src="./assets/images/image-avatar.webp"
            width="32"
            height="32"
            alt="article author avatar"
          />
          <span class="card__author__name">Greg Hooper</span>
        </a>
      </article>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by
      <a href="https://github.com/krivchenko74">Krivchenko Viacheslav</a>.
    </footer>
  </body>
</html>
